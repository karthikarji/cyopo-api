# --- Deployment (the running Redis container) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: cyopo-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
# --- Service (stable internal address: "redis") ---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: cyopo-dev
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
  clusterIP: None