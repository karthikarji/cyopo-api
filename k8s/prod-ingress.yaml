apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cyopo-api-ingress
  namespace: cyopo-prod
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "15m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.cyopo.com
      secretName: cyopo-api-tls
  rules:
    - host: api.cyopo.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cyopo-api
                port:
                  number: 80