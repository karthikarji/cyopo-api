spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/cyopo_db
    username: postgres
    password: postgres
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USER}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  data:
    redis:
      host: localhost
      port: 6379

cors:
  allowed-origins: http://localhost:3000,http://localhost:3001

jwt:
  secret: ${JWT_SECRET}

openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4o-mini

sentry:
  dsn: ${SENTRY_DSN:}
  traces-sample-rate: 1.0
  environment: dev

logging:
  level:
    com.cyopo: DEBUG
    org.hibernate.SQL: DEBUG